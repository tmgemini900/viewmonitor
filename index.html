<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ViewMonitor Pro 3.2 — Global OSINT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#020609; --panel:#050d12; --card:#09151c; --card2:#0d1f2a;
            --green:#00e5a0; --gdim:#006644; --cyan:#00d4ff; --cdim:#006080;
            --red:#ff3056; --yellow:#ffe030; --orange:#ff9a00; --purple:#b06eff;
            --blue:#1d9bf0; --border:rgba(0,229,160,.12); --text:#b8d8cc; --tdim:#3a6050;
            --mono:'Share Tech Mono',monospace; --sans:'Barlow Condensed',sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--green); font-family: var(--mono); }
        body { display: grid; grid-template-columns: 320px 1fr 350px; grid-template-rows: 44px 1fr; height: 100vh; }

        /* TOPBAR */
        #topbar { grid-column: 1/-1; display: flex; align-items: center; gap: 10px; background: #030a0f; border-bottom: 1px solid var(--border); padding: 0 15px; z-index: 100; }
        .brand { font-family: var(--sans); font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; }
        #sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
        #sdot.on { background: var(--green); box-shadow: 0 0 8px var(--green); }

        /* PANELS */
        #left, #right { background: var(--panel); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .rhead { padding: 10px; background: var(--bg); border-bottom: 1px solid var(--border); }
        #feed { flex: 1; overflow-y: auto; padding: 10px; }
        .card { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--gdim); padding: 10px; margin-bottom: 8px; border-radius: 2px; }
        .card.alarm { border-left-color: var(--red); background: rgba(255,48,86,0.05); }

        /* MAP AREA - KRİTİK ALAN */
        #mapwrap { position: relative; width: 100%; height: 100%; grid-column: 2; grid-row: 2; }
        #map { width: 100%; height: 100% !important; background: #000; }

        /* MODAL */
        #apimodal { position: fixed; inset: 0; z-index: 9999; background: rgba(2,6,9,0.98); display: flex; align-items: center; justify-content: center; }
        #apimodal.hidden { display: none; }
        .amodalbox { background: var(--panel); border: 1px solid var(--cyan); padding: 30px; border-radius: 8px; text-align: center; width: 400px; }
        .aurl { width: 100%; background: #000; border: 1px solid var(--cyan); color: #fff; padding: 10px; margin: 15px 0; border-radius: 4px; }
        .abtn { background: var(--green); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        
        .ctrans { color: #fff; font-size: 0.85rem; display: block; margin-top: 5px; font-family: var(--sans); }
        .corig { color: var(--tdim); font-size: 0.65rem; display: block; margin-top: 3px; font-style: italic; }
        .cmapbtn { background: none; border: 1px solid var(--cyan); color: var(--cyan); font-size: 0.6rem; padding: 2px 5px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<header id="topbar">
    <div class="brand">VIEW<em>MONITOR</em> PRO</div>
    <div id="sdot"></div>
    <div id="bstat" style="font-size:0.7rem">BAĞLANILIYOR...</div>
    <div style="flex:1"></div>
    <div id="clock">00:00:00</div>
    <button onclick="resetConnection()" style="font-size:0.6rem; cursor:pointer">API SIFIRLA</button>
</header>

<aside id="left">
    <div class="rhead">📺 SİSTEM</div>
    <div id="tvgrid" style="padding:10px; color:var(--tdim); font-size:0.7rem">Modüller yükleniyor...</div>
</aside>

<main id="mapwrap">
    <div id="map"></div>
</main>

<aside id="right">
    <div class="rhead">🧠 İSTİHBARAT AKIŞI</div>
    <div id="feed"><div class="empty" style="text-align:center; padding:20px; color:var(--tdim)">Veri bekleniyor...</div></div>
</aside>

<div id="apimodal" class="hidden">
    <div class="amodalbox">
        <h2>🛰 BACKEND BAĞLANTISI</h2>
        <p style="font-size:0.7rem; color:var(--tdim); margin-top:10px">Render linkini yapıştırın:</p>
        <input class="aurl" id="apiurl" type="text" placeholder="https://viewmonitor-api.onrender.com">
        <button class="abtn" onclick="saveApiUrl()">✓ BAĞLAN</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    'use strict';

    // 1. AYARLAR
    let API = localStorage.getItem('vm_api') || '';
    const feedEl = document.getElementById('feed');
    const sdot = document.getElementById('sdot');
    const bstat = document.getElementById('bstat');

    // 2. HARİTA KURULUMU
    const map = L.map('map').setView([39.0, 35.0], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© CartoDB'
    }).addTo(map);
    const alarmGroup = L.layerGroup().addTo(map);

    // 3. SAAT
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR');
    }, 1000);

    // 4. HABER KARTI
    function mkCard(m) {
        const isAlarm = m.ai_tespit ? 'alarm' : '';
        const mapBtn = m.koordinat ? `<button class="cmapbtn" onclick='focusMap(${JSON.stringify(m.koordinat)}, "${m.hedef_isim}")'>📍 HARİTA</button>` : '';
        
        return `
            <div class="card ${isAlarm}">
                <div style="font-size:0.6rem; color:var(--cyan)">${m.kaynak || 'RSS'} | ${m.zaman || ''}</div>
                <span class="ctrans">${m.mesaj_ceviri || ''}</span>
                <span class="corig">${(m.mesaj_orijinal || '').substring(0, 80)}...</span>
                ${mapBtn}
            </div>`;
    }

    // 5. HARİTA ODAKLAMA
    window.focusMap = function(coords, name) {
        map.flyTo(coords, 10);
        L.marker(coords).addTo(alarmGroup).bindPopup(name).openPopup();
    };

    // 6. SSE BAĞLANTISI
    function connectSSE() {
        if(!API) return;
        
        console.log("Bağlanılıyor: " + API);
        const es = new EventSource(`${API}/api/stream`);
        
        es.onopen = () => {
            sdot.className = 'on';
            bstat.textContent = 'SİSTEM CANLI';
            bstat.style.color = 'var(--green)';
        };

        es.onmessage = (e) => {
            try {
                const m = JSON.parse(e.data);
                if(m.ping) return;
                
                if(feedEl.querySelector('.empty')) feedEl.innerHTML = '';
                feedEl.insertAdjacentHTML('afterbegin', mkCard(m));
                
                // Otomatik harita işareti
                if(m.ai_tespit && m.koordinat) {
                    window.focusMap(m.koordinat, m.hedef_isim);
                }
            } catch(err) { console.error("Veri hatası", err); }
        };

        es.onerror = () => {
            sdot.className = '';
            bstat.textContent = 'BAĞLANTI KESİLDİ';
            bstat.style.color = 'var(--red)';
            es.close();
            setTimeout(connectSSE, 5000);
        };
    }

    // 7. MODAL YÖNETİMİ
    window.saveApiUrl = function() {
        let url = document.getElementById('apiurl').value.trim().replace(/\/$/, '');
        if(url.startsWith('http')) {
            localStorage.setItem('vm_api', url);
            location.reload();
        } else {
            alert("Geçerli bir URL girin (https://...)");
        }
    };

    window.resetConnection = function() {
        localStorage.removeItem('vm_api');
        location.reload();
    };

    // BAŞLATICI
    if (!API) {
        document.getElementById('apimodal').classList.remove('hidden');
    } else {
        connectSSE();
    }

    // Haritayı render etmesi için küçük bir tetikleyici
    setTimeout(() => { map.invalidateSize(); }, 500);

</script>
</body>
</html>
