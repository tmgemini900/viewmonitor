# ViewMonitor Pro — Nginx Reverse Proxy Yapılandırması
# Dosya: /etc/nginx/conf.d/viewmonitor.conf
#
# KURULUM:
# 1. Bu dosyayı /etc/nginx/conf.d/viewmonitor.conf olarak kopyalayın
# 2. /etc/nginx/nginx.conf içindeki http { } bloğuna şunu ekleyin:
#       limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
# 3. DOMAIN_ADINIZ.com'u gerçek domain adresinizle değiştirin
# 4. SSL sertifikası: certbot --nginx -d DOMAIN_ADINIZ.com

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    server_name DOMAIN_ADINIZ.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name DOMAIN_ADINIZ.com;

    # SSL Sertifikaları (Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_ADINIZ.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_ADINIZ.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Güvenlik header'ları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Frontend (HTML dosyası)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — Backend'e yönlendir
    location /api/ {
        proxy_pass         http://viewmonitor:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Düzeltme: limit_req_zone /etc/nginx/nginx.conf http{} bloğuna eklendiği varsayılıyor
        limit_req zone=api burst=10 nodelay;
    }

    # SSE stream endpoint — uzun bağlantı için özel ayarlar
    location /api/stream {
        proxy_pass         http://viewmonitor:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE için kritik ayarlar
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        chunked_transfer_encoding on;

        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";
    }
}

# ══════════════════════════════════════════════════════════════
# /etc/nginx/nginx.conf dosyasına http { } BLOĞU İÇİNE EKLEYİN:
# ══════════════════════════════════════════════════════════════
#
# http {
#     ...
#     # Rate limiting — IP başına dakikada 20 istek
#     limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
#     ...
# }
#
# Bu satır olmadan Nginx "zone 'api' not found" hatası verir ve başlamaz!
# ══════════════════════════════════════════════════════════════
