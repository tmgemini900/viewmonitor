<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ViewMonitor Pro 3.2 — Global OSINT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020609;--panel:#050d12;--card:#09151c;--card2:#0d1f2a;
  --green:#00e5a0;--gdim:#006644;--cyan:#00d4ff;--cdim:#006080;
  --red:#ff3056;--yellow:#ffe030;--orange:#ff9a00;--purple:#b06eff;
  --blue:#1d9bf0;
  --border:rgba(0,229,160,.12);--bhot:rgba(255,48,86,.4);
  --text:#b8d8cc;--tdim:#3a6050;
  --mono:'Share Tech Mono',monospace;--sans:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--green);font-family:var(--mono);
     display:grid;
     grid-template-columns:320px 1fr 350px;
     grid-template-rows:44px 1fr;
     height:100vh}

/* ─── TOPBAR ─── */
#topbar{grid-column:1/-1;display:flex;align-items:center;gap:7px;
        background:#030a0f;border-bottom:1px solid var(--border);padding:0 10px;
        position:relative;z-index:10}
.brand{font-family:var(--sans);font-size:1.1rem;font-weight:900;
       letter-spacing:4px;white-space:nowrap;color:var(--green)}
.brand em{color:var(--cyan);font-style:normal}
.tbsep{color:var(--tdim);font-size:.65rem}
.tstat{font-size:.6rem;color:var(--tdim);white-space:nowrap}
.tstat b{color:var(--cyan)}
.tstat.hot b{color:var(--red)}
.tstat.id  b{color:var(--blue)}
.tstat.rd  b{color:var(--purple)}
.spacer{flex:1}
.tbtn{background:transparent;border:1px solid var(--border);color:var(--tdim);
      font-family:var(--mono);font-size:.58rem;padding:3px 8px;cursor:pointer;
      border-radius:2px;white-space:nowrap;transition:all .15s}
.tbtn:hover,.tbtn.on{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.05)}
.tbtn.red:hover,.tbtn.red.on{border-color:var(--red);color:var(--red);background:rgba(255,48,86,.05)}
.tbtn.ora:hover{border-color:var(--orange);color:var(--orange)}
#clock{color:var(--yellow);font-size:.85rem;letter-spacing:1px;white-space:nowrap;margin-left:4px}
#sdot{width:8px;height:8px;border-radius:50%;background:var(--red);
      display:inline-block;margin-right:4px;transition:all .3s}
#sdot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}

/* ─── LEFT PANEL ─── */
#left{background:var(--panel);border-right:1px solid var(--border);
      display:flex;flex-direction:column;overflow:hidden}
.ptabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.ptab{flex:1;padding:7px 0;background:transparent;border:none;color:var(--tdim);
      cursor:pointer;font-family:var(--mono);font-size:.55rem;letter-spacing:.5px;
      text-transform:uppercase;border-bottom:2px solid transparent;transition:all .15s}
.ptab.on{color:var(--green);border-bottom-color:var(--green)}
.ptab:hover{color:var(--text)}
.tpanel{display:none;flex:1;overflow-y:auto;flex-direction:column}
.tpanel.on{display:flex}
.tpanel::-webkit-scrollbar{width:3px}
.tpanel::-webkit-scrollbar-thumb{background:var(--gdim)}

/* ── MULTITV VIDEO GRID ── */
#tvpanel{display:flex;flex:1;flex-direction:column;overflow:hidden}
.tv-grid-controls{display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.tv-grid-controls span{font-size:.58rem;color:var(--tdim)}
.grid-btns{display:flex;gap:3px}
.gbtn{background:transparent;border:1px solid var(--border);color:var(--tdim);
      font-family:var(--mono);font-size:.58rem;padding:2px 7px;cursor:pointer;
      border-radius:2px;transition:all .12s}
.gbtn.on,.gbtn:hover{border-color:var(--cyan);color:var(--cyan)}
#tvgrid{flex:1;display:grid;gap:2px;padding:2px;background:var(--bg);overflow:hidden}
.vslot{position:relative;background:#000;border:1px solid rgba(0,229,160,.08);
       border-radius:2px;overflow:hidden;cursor:pointer}
.vslot:hover{border-color:rgba(0,229,160,.3)}
.vslot video{width:100%;height:100%;object-fit:cover;display:block}
.vslot .vlabel{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
  padding:4px 6px 4px;display:flex;align-items:center;justify-content:space-between;
  pointer-events:none}
.vslot .vlabel .vname{font-family:var(--sans);font-size:.62rem;font-weight:700;
  color:#fff;text-shadow:0 1px 3px #000;letter-spacing:.5px}
.vslot .vlabel .vlive{background:var(--red);color:#fff;font-size:.48rem;
  padding:1px 4px;border-radius:2px;animation:blink 1.5s infinite;font-weight:700;font-family:var(--sans)}
.vslot .vmute{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);
  border:none;color:var(--text);cursor:pointer;font-size:.7rem;
  padding:2px 4px;border-radius:2px;opacity:0;transition:opacity .2s}
.vslot:hover .vmute{opacity:1}

/* KATMAN PANELİ */
.lpanel{padding:8px;overflow-y:auto;flex:1}
.lsec{margin-bottom:12px}
.lsec h4{font-size:.6rem;color:var(--orange);text-transform:uppercase;
         letter-spacing:1px;margin-bottom:5px;padding-bottom:3px;
         border-bottom:1px solid rgba(255,154,0,.15)}
.lbtn{display:block;width:100%;padding:6px 8px;background:var(--card);
      border:1px solid var(--border);color:var(--text);font-family:var(--mono);
      font-size:.62rem;cursor:pointer;margin-bottom:4px;border-radius:2px;
      text-align:left;transition:all .15s}
.lbtn:hover,.lbtn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.04)}
.lbtn small{color:var(--tdim);font-size:.52rem;display:block;margin-top:1px}

/* ─── MAP ─── */
#mapwrap{position:relative;overflow:hidden}
#map{width:100%;height:100%;background:var(--bg)}
.mctrls{position:absolute;top:10px;right:10px;z-index:1000;
        display:flex;flex-direction:column;gap:4px;max-width:140px}
.mbtn{background:rgba(5,13,18,.92);border:1px solid var(--border);color:var(--green);
      font-family:var(--mono);font-size:.58rem;padding:5px 8px;cursor:pointer;
      border-radius:2px;white-space:nowrap;transition:all .2s;backdrop-filter:blur(4px)}
.mbtn:hover,.mbtn.on{border-color:var(--cyan);color:var(--cyan)}
.mbtn.hot{border-color:rgba(255,154,0,.4);color:var(--orange)}
.minfo{position:absolute;bottom:10px;left:10px;z-index:1000;
       background:rgba(5,13,18,.88);border:1px solid var(--border);
       padding:5px 10px;font-size:.58rem;border-radius:2px;backdrop-filter:blur(4px)}
.minfo span{color:var(--cyan)}

/* ─── RIGHT PANEL ─── */
#right{background:var(--panel);border-left:1px solid var(--border);
       display:flex;flex-direction:column;overflow:hidden}
.rhead{padding:7px 10px;background:var(--bg);border-bottom:1px solid var(--border);
       display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rhead h2{font-family:var(--sans);font-size:0.8rem;font-weight:700;letter-spacing:2px;color:var(--green)}

#feed{flex:1;overflow-y:auto;padding:6px 8px;scroll-behavior:smooth}
.card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gdim);
      border-radius:2px;padding:8px 10px;margin-bottom:6px;
      animation:slideIn .25s ease;transition:border-color .15s,background .15s}
.card.alarm{border-left-color:var(--red);background:rgba(255,48,86,.04)}

/* ── API Config Modal ── */
#apimodal{position:fixed;inset:0;z-index:99999;background:rgba(2,6,9,.97);
  display:flex;align-items:center;justify-content:center;flex-direction:column}
#apimodal.hidden{display:none}
.amodalbox{background:var(--panel);border:1px solid var(--cyan);border-radius:6px;
  padding:32px 36px;max-width:520px;width:90%;text-align:center}
.amodalbox h2{font-family:var(--sans);font-size:1.2rem;font-weight:900;
  letter-spacing:3px;color:var(--green);margin-bottom:6px}
.amodalbox p{color:var(--tdim);font-size:.7rem;margin-bottom:20px;line-height:1.7}
.amodalbox .aurl{width:100%;background:var(--bg);border:1px solid var(--cyan);
  color:var(--text);font-family:var(--mono);font-size:.78rem;padding:10px 12px;
  border-radius:4px;outline:none;margin-bottom:12px}
.amodalbox .abtn{background:rgba(0,229,160,.12);border:1px solid var(--green);
  color:var(--green);font-family:var(--mono);font-size:.75rem;padding:9px 24px;
  cursor:pointer;border-radius:4px;transition:all .15s;margin:0 4px}
.amodalbox .askip{background:transparent;border:1px solid var(--tdim);
  color:var(--tdim);font-family:var(--mono);font-size:.68rem;padding:7px 14px;
  cursor:pointer;border-radius:4px;transition:all .15s;margin:0 4px}

/* Toasts */
#toasts{position:fixed;top:50px;right:12px;z-index:9999;display:flex;
        flex-direction:column;gap:4px;pointer-events:none;max-width:290px}
.toast{background:var(--card2);border:1px solid var(--red);border-radius:3px;
       padding:8px 12px;font-size:.68rem;color:var(--text);
       box-shadow:0 0 16px rgba(255,48,86,.2);animation:slideIn .3s ease}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes radar{0%{transform:scale(.1);opacity:1}100%{transform:scale(3);opacity:0}}
@keyframes slideIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

.radar{background:transparent;border:2px solid var(--red);border-radius:50%;
       box-shadow:0 0 20px var(--red);animation:radar 1.5s infinite ease-out}
.radar-inner{width:10px;height:10px;background:var(--red);border-radius:50%;
             position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.cbadge{font-size:.52rem;padding:1px 4px;border-radius:2px;border:1px solid;font-family:var(--sans);font-weight:600;margin-right:3px}
.cbadge.tg{color:var(--cyan);border-color:var(--cyan)}
.ctrans{color:var(--text);font-size:.76rem;line-height:1.5;display:block;margin-bottom:3px;font-family:var(--sans)}
.corig{color:var(--tdim);font-size:.58rem;font-style:italic;display:block}
.cmapbtn{background:transparent;border:1px solid rgba(0,212,255,.15);color:var(--tdim);
          font-family:var(--mono);font-size:.52rem;padding:1px 5px;cursor:pointer;
          border-radius:2px;transition:all .12s}
</style>
</head>
<body>

<header id="topbar">
  <div class="brand">VIEW<em>MONITOR</em> <span style="font-size:.55rem;color:var(--tdim);font-weight:400;letter-spacing:1px">PRO 3.2</span></div>
  <div class="tbsep">|</div>
  <span id="sdot"></span>
  <span id="bstat" style="font-size:.6rem;color:var(--tdim)">BAĞLANIYOR</span>
  <div class="spacer"></div>
  <div id="clock">--:--:--</div>
</header>

<aside id="left">
  <div class="ptabs">
    <button class="ptab on">📺 TV</button>
  </div>
  <div id="tab-tv" class="tpanel on">
    <div id="tvgrid" style="display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:2px;"></div>
  </div>
</aside>

<div id="mapwrap">
  <div id="map"></div>
  <div class="minfo">
    KAT: <span id="mi-kat">KARANLIK</span> | SSE: <span id="mi-sse">—</span>
  </div>
</div>

<aside id="right">
  <div class="rhead"><h2>🧠 İSTİHBARAT AKIŞI</h2></div>
  <div id="feed"><div class="empty">SSE bağlantısı bekleniyor...</div></div>
</aside>

<div id="apimodal" class="hidden">
  <div class="amodalbox">
    <h2>🛰 VIEWMONITOR PRO</h2>
    <p>Backend API adresini girin.<br><span style="color:var(--green)">Render.com</span> URL'si.</p>
    <input class="aurl" id="apiurl" type="text" placeholder="https://viewmonitor-api.onrender.com">
    <div style="margin-top:10px;">
      <button class="abtn" onclick="saveApiUrl()">✓ BAĞLAN</button>
      <button class="askip" onclick="skipApiModal()">Localhost (8080)</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

// 1. API ADRESİ ÇÖZÜMLEME
const savedApi = localStorage.getItem('vm_api');
const API = savedApi || 'http://127.0.0.1:8080';

// 2. SAAT
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR');
}, 1000);

// 3. HARİTA BAŞLATMA
const map = L.map('map').setView([38.5, 34], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
const alarmGroup = L.layerGroup().addTo(map);
const radarIcon = L.divIcon({className:'radar',iconSize:[40,40],html:'<div class="radar-inner"></div>'});

// 4. HABER KARTI OLUŞTURUCU (Hata düzeltildi)
function mkCard(m) {
  const tip = m.kaynak_tip || 'rss';
  const coordJson = m.koordinat ? JSON.stringify(m.koordinat) : null;
  const mapBtn = m.koordinat ? `<button class="cmapbtn" onclick='gotoMap(${coordJson}, "${m.hedef_isim}")'>📍 HARİTA</button>` : '';
  
  return `
    <div class="card ${m.ai_tespit ? 'alarm' : ''}">
      <div style="font-size:0.6rem;color:var(--tdim);margin-bottom:4px;">
        <span class="cbadge tg">${tip.toUpperCase()}</span> ${m.kaynak} | ${m.zaman}
      </div>
      <span class="ctrans">${m.mesaj_ceviri || ''}</span>
      <span class="corig">${(m.mesaj_orijinal || '').substring(0, 100)}...</span>
      <div style="margin-top:5px;">${mapBtn}</div>
    </div>`;
}

// 5. HARİTAYA GİT
window.gotoMap = function(coord, name) {
  if(!coord) return;
  map.flyTo(coord, 10);
  L.marker(coord, {icon: radarIcon}).addTo(alarmGroup).bindPopup(name).openPopup();
};

// 6. SSE BAĞLANTISI
function connectSSE() {
  const es = new EventSource(`${API}/api/stream`);
  const sdot = document.getElementById('sdot');
  const bstat = document.getElementById('bstat');
  
  es.onopen = () => {
    sdot.className = 'on';
    bstat.textContent = 'CANLI';
    document.getElementById('mi-sse').textContent = 'CANLI';
    document.getElementById('mi-sse').style.color = 'var(--green)';
  };

  es.onmessage = (e) => {
    const m = JSON.parse(e.data);
    if(m.ping) return;
    const feed = document.getElementById('feed');
    if(feed.querySelector('.empty')) feed.innerHTML = '';
    feed.insertAdjacentHTML('afterbegin', mkCard(m));
  };

  es.onerror = () => {
    es.close();
    sdot.className = '';
    bstat.textContent = 'KESİLDİ';
    setTimeout(connectSSE, 5000);
  };
}

// 7. API MODAL YÖNETİMİ
window.saveApiUrl = function() {
  const url = document.getElementById('apiurl').value.trim().replace(/\/$/, '');
  if(url.startsWith('http')) {
    localStorage.setItem('vm_api', url);
    location.reload();
  }
};

window.skipApiModal = function() {
  localStorage.setItem('vm_api', 'http://127.0.0.1:8080');
  location.reload();
};

function initApiModal() {
  if(!savedApi) {
    document.getElementById('apimodal').classList.remove('hidden');
  } else {
    connectSSE();
  }
}

// BAŞLAT
initApiModal();
</script>
</body>
</html>
