services:
  - type: web
    name: viewmonitor-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn viewmonitor_api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/durum
    autoDeploy: true
